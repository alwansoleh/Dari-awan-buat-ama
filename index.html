<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sayang! 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-bg: #fdf2f8; 
            --accent: #f472b6; 
            --text-color: #4b5563;
            --flame-outer: #ff9f43;
            --flame-inner: #fff200;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Quicksand', sans-serif;
            background-color: var(--pink-bg);
            color: var(--text-color);
            overflow-x: hidden;
            background-image: radial-gradient(#fbcfe8 1px, transparent 1px);
            background-size: 20px 20px; 
        }

        /* --- Navigasi (Responsif) --- */
        .sidebar {
            position: fixed; left: 15px; top: 50%;
            transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 15px;
            z-index: 9999;
        }

        .side-btn {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid var(--accent);
            width: 50px; height: 50px;
            border-radius: 50%; cursor: pointer;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(244, 114, 182, 0.2);
            transition: 0.3s ease;
            display: flex; align-items: center; justify-content: center;
        }

        .side-btn:hover, .side-btn.active-btn { 
            background: var(--accent); color: white; transform: scale(1.1) translateY(-2px); 
        }

        /* --- Khusus Tampilan HP (Mobile) --- */
        @media (max-width: 768px) {
            .sidebar {
                left: 50%; top: auto; bottom: 20px;
                transform: translateX(-50%);
                flex-direction: row;
                background: rgba(255, 255, 255, 0.9);
                padding: 10px 15px;
                border-radius: 40px;
                box-shadow: 0 4px 15px rgba(244, 114, 182, 0.3);
                gap: 10px;
            }
            .side-btn { width: 45px; height: 45px; font-size: 18px; }
            .glass-card { margin-bottom: 90px !important; padding: 30px !important; }
            h1 { font-size: 28px !important; }
        }

        /* --- Kontainer Utama --- */
        .main-content {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px;
            text-align: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 40px; border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05), border: 1px solid rgba(255,255,255,0.5);
            max-width: 450px; width: 100%;
            position: relative;
        }

        h1 { font-family: 'Pacifico', cursive; color: var(--accent); margin-bottom: 5px; font-size: 32px; text-shadow: 2px 2px 4px rgba(244, 114, 182, 0.2); }
        #teks-instruksi { font-size: 16px; margin-bottom: 30px; color: #6b7280; font-weight: 600;}

        /* --- Tombol Aksi --- */
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 10px; }
        .action-btn {
            background: var(--accent); color: white; border: none; padding: 12px 28px;
            border-radius: 25px; cursor: pointer; font-family: 'Quicksand', sans-serif; font-weight: 700;
            font-size: 16px; transition: all 0.3s ease; box-shadow: 0 8px 20px rgba(244, 114, 182, 0.3);
        }
        .action-btn:hover { background: #ec4899; transform: translateY(-3px); box-shadow: 0 10px 25px rgba(236, 72, 153, 0.4); }
        .action-btn.relight { background: #fbbf24; box-shadow: 0 8px 20px rgba(251, 191, 36, 0.3); color: #78350f; } 
        .action-btn.relight:hover { background: #f59e0b; transform: translateY(-3px); }

        /* --- KUE ULANG TAHUN ESTETIK --- */
        .cake-container { position: relative; margin: 80px 0 50px 0; display: flex; justify-content: center; z-index: 10; }
        .plate { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); width: 220px; height: 50px; background: #ffffff; border-radius: 50%; box-shadow: 0 15px 20px rgba(0,0,0,0.06), inset 0 -5px 10px rgba(0,0,0,0.02); z-index: -1; }
        .cake { width: 170px; height: 110px; background: #fff4e6; border-radius: 15px 15px 10px 10px; position: relative; box-shadow: inset -10px -10px 20px rgba(0,0,0,0.03), 0 8px 15px rgba(0,0,0,0.05); }
        .icing { position: absolute; top: 0; left: 0; width: 100%; height: 45px; background: #ffb8c6; border-radius: 15px 15px 0 0; }
        .drip { position: absolute; background: #ffb8c6; border-radius: 0 0 20px 20px; box-shadow: 2px 2px 5px rgba(0,0,0,0.02); }
        .d1 { width: 30px; height: 25px; left: 5px; top: 40px; }
        .d2 { width: 35px; height: 45px; left: 30px; top: 40px; }
        .d3 { width: 30px; height: 15px; left: 60px; top: 40px; }
        .d4 { width: 45px; height: 35px; left: 85px; top: 40px; }
        .d5 { width: 30px; height: 20px; left: 125px; top: 40px; }
        .d6 { width: 15px; height: 10px; left: 150px; top: 40px; border-radius: 0 0 10px 10px;}

        .candle-wrapper { position: absolute; top: -65px; left: 50%; transform: translateX(-50%); width: 20px; z-index: 5; }
        .candle-body { width: 14px; height: 55px; background: repeating-linear-gradient(-45deg, #ffffff, #ffffff 6px, #ff9ff3 6px, #ff9ff3 12px); border-radius: 6px; position: absolute; left: 3px; box-shadow: 2px 2px 5px rgba(0,0,0,0.08); border: 1px solid rgba(255,255,255,0.8); }
        .wick { width: 3px; height: 12px; background: #555; position: absolute; top: -10px; left: 8.5px; border-radius: 2px; }
        .flame { width: 18px; height: 30px; background-color: var(--flame-inner); border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%; position: absolute; top: -38px; left: 1px; box-shadow: 0 0 15px var(--flame-inner), 0 0 25px var(--flame-outer), 0 0 45px var(--flame-outer); transform-origin: bottom center; animation: flicker 0.3s ease-in-out infinite alternate; filter: blur(0.5px); }
        .flame::after { content: ''; width: 8px; height: 18px; background: rgba(255, 255, 255, 0.9); border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%; position: absolute; bottom: 3px; left: 5px; }

        @keyframes flicker { 0% { transform: rotate(-2deg) scaleY(1.0); opacity: 0.9; } 25% { transform: rotate(1deg) scaleY(1.05); opacity: 1; } 50% { transform: rotate(-1deg) scaleY(0.95); opacity: 0.95; } 75% { transform: rotate(2deg) scaleY(1.02); opacity: 1; } 100% { transform: rotate(-1deg) scaleY(1.0); opacity: 0.9; } }

        /* --- MUSIC PLAYER ESTETIK --- */
        .music-player-card { background: rgba(255, 182, 193, 0.2); border-radius: 20px; padding: 25px; margin-top: 20px; border: 1px solid rgba(244, 114, 182, 0.3); }
        .track-title { font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 5px; }
        .track-artist { font-size: 14px; color: #6b7280; margin-bottom: 20px; }
        .play-btn-large { background: var(--accent); color: white; border: none; width: 65px; height: 65px; border-radius: 50%; font-size: 24px; cursor: pointer; box-shadow: 0 4px 15px rgba(244, 114, 182, 0.4); display: flex; align-items: center; justify-content: center; margin: 0 auto; transition: 0.3s; }
        .play-btn-large:hover { transform: scale(1.1); background: #ec4899; }
        .progress-container { width: 100%; height: 8px; background: #ffe4e1; border-radius: 5px; margin: 20px 0 10px 0; overflow: hidden; }
